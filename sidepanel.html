<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snaps by T4H</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 12px 16px; border-bottom: 1px solid #1e293b;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-size: 13px; font-weight: 700; color: #38bdf8; letter-spacing: .04em; }
  .hdr-btns { display: flex; gap: 8px; }
  .icon-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8;
              padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
  .tabs { display: flex; border-bottom: 1px solid #1e293b; flex-shrink: 0; }
  .tab { flex: 1; padding: 9px 0; font-size: 11px; font-weight: 600; text-align: center;
         color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }
  .pane { display: none; flex: 1; overflow-y: auto; padding: 12px 14px; }
  .pane.active { display: block; }
  /* Snaps stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .stat { background: #1e293b; border-radius: 8px; padding: 10px 12px; }
  .stat-val { font-size: 22px; font-weight: 700; color: #38bdf8; }
  .stat-lbl { font-size: 10px; color: #64748b; margin-top: 2px; }
  .stat.green .stat-val { color: #34d399; }
  .stat.amber .stat-val { color: #fbbf24; }
  /* Recent snaps */
  .snap-item { background: #1e293b; border-radius: 7px; padding: 9px 11px; margin-bottom: 7px;
               border-left: 3px solid #334155; }
  .snap-item.real { border-left-color: #34d399; }
  .snap-item.partial { border-left-color: #fbbf24; }
  .snap-item.pretend { border-left-color: #f87171; }
  .snap-title { font-size: 12px; font-weight: 600; white-space: nowrap;
                overflow: hidden; text-overflow: ellipsis; }
  .snap-meta { font-size: 10px; color: #64748b; margin-top: 3px; }
  .snap-biz { color: #38bdf8; }
  /* Widgets */
  .widget-card { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .widget-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 700;
           text-transform: uppercase; margin-left: 6px; }
  .badge-real { background: #064e3b; color: #34d399; }
  .badge-partial { background: #451a03; color: #fbbf24; }
  .badge-pretend { background: #450a0a; color: #f87171; }
  .empty { color: #475569; font-size: 12px; text-align: center; padding: 30px 0; }
  .loading { color: #475569; font-size: 11px; padding: 8px 0; }
</style>
</head>
<body>
<div class="header">
  <span class="logo">⚡ Snaps by T4H</span>
  <div class="hdr-btns">
    <button class="icon-btn" id="snap-now">Snap</button>
    <button class="icon-btn" id="refresh">↻</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="snaps">Snaps</div>
  <div class="tab" data-tab="consent">Consent</div>
  <div class="tab" data-tab="widgets">Widgets</div>
  <div class="tab" data-tab="revenue">Revenue</div>
</div>
<div class="pane active" id="pane-snaps">
  <div class="stat-grid" id="stats"><div class="loading">Loading…</div></div>
  <div id="recent-snaps"><div class="loading">Loading snaps…</div></div>
</div>
<div class="pane" id="pane-widgets">
  <div id="widget-grid"><div class="loading">Loading widgets…</div></div>
</div>
<div class="pane" id="pane-consent">
  <div style="padding:4px 0 10px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:11px;font-weight:700;color:#e2e8f0">Detected Events</span>
    <span id="sp-cx-count" style="font-size:9px;background:rgba(155,66,24,.25);color:#f87171;padding:2px 7px;border-radius:8px;font-weight:700">0</span>
  </div>
  <button onclick="spScanConsent()" style="width:100%;padding:7px;background:rgba(21,107,111,.2);border:1px solid rgba(21,107,111,.4);color:#2dd4bf;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-bottom:8px">🔍 Scan Current Page</button>
  <button id="sp-capture-all" onclick="spCaptureAll()" style="display:none;width:100%;padding:8px;background:#9b4218;color:#fff;border:none;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-bottom:8px">Capture All to Wallet →</button>
  <div id="sp-cx-events"><div class="empty">Click Scan to detect consent events on the active page.</div></div>
  <div style="margin-top:12px;border-top:1px solid #1e293b;padding-top:10px">
    <div style="font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px">Recent wallet records</div>
    <div id="sp-wallet-recs"><div class="loading">Loading…</div></div>
    <a href="https://consentx.org/wallet.html" target="_blank" style="display:block;text-align:center;margin-top:8px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#156b6f;text-decoration:none">Open full wallet →</a>
  </div>
</div>
<div class="pane" id="pane-revenue">
  <div id="revenue-content"><div class="loading">Loading pipeline…</div></div>
</div>
<script src="sidepanel.js" type="module"></script>
</body>
</html>
