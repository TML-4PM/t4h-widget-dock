<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T4H Widget Dock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; height: 100vh; overflow-y: auto; }
  .header { padding: 12px 16px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #0f172a; z-index: 10; }
  .logo { font-size: 16px; font-weight: 600; }
  .refresh-btn { background: none; border: 1px solid #334155; color: #94a3b8; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .refresh-btn:hover { border-color: #6d28d9; color: #e2e8f0; }
  .widget-grid { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .widget-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 12px; }
  .widget-card.status-real { border-left: 3px solid #22c55e; }
  .widget-card.status-partial { border-left: 3px solid #f59e0b; }
  .widget-card.status-pretend { border-left: 3px solid #6b7280; }
  .widget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .widget-title { font-size: 13px; font-weight: 600; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: 600; }
  .badge-real { background: #14532d; color: #4ade80; }
  .badge-partial { background: #451a03; color: #fbbf24; }
  .badge-pretend { background: #1e293b; color: #64748b; border: 1px solid #334155; }
  .widget-body { font-size: 12px; color: #94a3b8; }
  .widget-loading { text-align: center; padding: 20px; color: #64748b; font-size: 12px; }
  .signin-prompt { margin: 40px 16px; text-align: center; }
  .signin-prompt h3 { font-size: 15px; margin-bottom: 8px; }
  .signin-prompt p { font-size: 12px; color: #64748b; margin-bottom: 16px; }
  .signin-btn { background: #6d28d9; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <span class="logo">🧩 Widget Dock</span>
  <button class="refresh-btn" id="refresh">↻ Refresh</button>
</div>
<div id="root">
  <div class="widget-loading">Loading your widgets…</div>
</div>
<script src="sidepanel.js"></script>
</body>
</html>
