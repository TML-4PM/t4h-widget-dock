<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snaps by T4H</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f172a; color: #e2e8f0; }
  .header { padding: 14px 16px 10px; border-bottom: 1px solid #1e293b; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: .04em; color: #38bdf8; }
  .note-wrap { padding: 12px 16px 8px; }
  textarea { width: 100%; background: #1e293b; border: 1px solid #334155;
             color: #e2e8f0; border-radius: 6px; padding: 8px 10px;
             font-size: 12px; resize: none; outline: none; }
  textarea::placeholder { color: #64748b; }
  .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 10px; }
  .btn { padding: 9px 0; border: 0; border-radius: 6px; font-size: 12px;
         font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-snap { background: #38bdf8; color: #0f172a; }
  .btn-dump { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .btn-panel { width: calc(100% - 32px); margin: 0 16px 6px; background: #1e293b;
               color: #94a3b8; border: 1px solid #334155; }
  .status { margin: 0 16px 12px; padding: 7px 10px; background: #1e293b;
            border-radius: 6px; font-size: 11px; color: #64748b; min-height: 28px; }
  .status.ok { color: #34d399; }
  .status.err { color: #f87171; }
  .kbd { font-size: 10px; color: #475569; padding: 6px 16px 10px; }
</style>
</head>
<body>
<div class="header"><span class="logo">⚡ Snaps by T4H</span></div>
<div class="note-wrap">
  <textarea id="note" rows="3" placeholder="Add a note (optional)…"></textarea>
</div>
<div class="btns">
  <button class="btn btn-snap" id="snap">Snap tab</button>
  <button class="btn btn-dump" id="dump">Dump window</button>
</div>
<button class="btn btn-panel" id="panel">Open widget panel →</button>
<div class="status" id="status">Ready</div>
<div class="kbd">⌘⇧S snap · ⌘⇧D dump window</div>
<script src="popup.js" type="module"></script>
</body>
</html>
