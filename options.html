<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T4H Widget Dock — Settings</title>
<style>
  body { max-width: 480px; margin: 40px auto; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 32px; }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-top: 20px; }
  input { width: 100%; padding: 10px 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 13px; font-family: monospace; }
  input:focus { outline: none; border-color: #6d28d9; }
  .save-btn { margin-top: 24px; background: #6d28d9; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .save-btn:hover { background: #7c3aed; }
  .status { margin-top: 12px; font-size: 12px; color: #22c55e; }
</style>
</head>
<body>
<h1>🧩 T4H Widget Dock</h1>
<div class="sub">Connect your T4H account to load widgets</div>
<label for="api_key">Supabase Anon Key</label>
<input type="text" id="api_key" placeholder="eyJhbGci…">
<label for="supabase_url">Supabase URL (optional)</label>
<input type="text" id="supabase_url" placeholder="https://lzfgigiyqpuuxslsygjt.supabase.co">
<button class="save-btn" id="save">Save & Sync</button>
<div class="status" id="status" style="display:none">✓ Saved</div>
<script src="options.js"></script>
</body>
</html>
