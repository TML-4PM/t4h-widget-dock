<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snaps by T4H — Settings</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f172a; color: #e2e8f0; max-width: 480px; margin: 40px auto; padding: 0 20px; }
  h2 { font-size: 16px; font-weight: 700; color: #38bdf8; margin-bottom: 24px; }
  label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  input { width: 100%; background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
          border-radius: 6px; padding: 9px 12px; font-size: 13px; outline: none; margin-bottom: 16px; }
  input:focus { border-color: #38bdf8; }
  button { background: #38bdf8; color: #0f172a; border: 0; border-radius: 6px;
           padding: 10px 24px; font-size: 13px; font-weight: 700; cursor: pointer; }
  #status { display: none; color: #34d399; font-size: 12px; margin-top: 12px; }
  .hint { font-size: 11px; color: #475569; margin-top: -12px; margin-bottom: 16px; }
</style>
</head>
<body>
<h2>⚡ Snaps by T4H — Settings</h2>
<label>Supabase API Key (anon key)</label>
<input type="password" id="api_key" placeholder="eyJ..." />
<p class="hint">Found in your T4H account → API keys</p>
<label>Supabase URL (optional override)</label>
<input type="text" id="supabase_url" placeholder="https://lzfgigiyqpuuxslsygjt.supabase.co" />
<label>Ingest API Key (optional override)</label>
<input type="password" id="ingest_api_key" placeholder="ik_..." />
<p class="hint">Used to send snaps. Defaults to T4H shared key if blank.</p>
<button id="save">Save settings</button>
<div id="status">Settings saved ✓</div>
<script src="options.js"></script>
</body>
</html>
